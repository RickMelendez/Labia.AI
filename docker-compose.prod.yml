# Labia.AI - Production Docker Compose Configuration
# Use this for production/staging deployments

version: '3.8'

services:
  # ============================================
  # Backend API
  # ============================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: labia-ai-backend-prod
    restart: always
    env_file:
      - ./backend/.env.production  # Use .env.staging for staging
    ports:
      - "8000:8000"
    volumes:
      - ./backend/logs:/app/logs
    networks:
      - labia-ai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # Nginx Reverse Proxy
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: labia-ai-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/html:/usr/share/nginx/html:ro
    depends_on:
      - backend
    networks:
      - labia-ai-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ============================================
# Networks
# ============================================
networks:
  labia-ai-network:
    driver: bridge
    name: labia-ai-prod-network

# ============================================
# Note: PostgreSQL and Redis should use managed services in production
# Examples:
# - AWS: RDS (PostgreSQL) + ElastiCache (Redis)
# - DigitalOcean: Managed Database + Managed Redis
# - Railway/Render: Managed PostgreSQL + Redis add-ons
# ============================================
