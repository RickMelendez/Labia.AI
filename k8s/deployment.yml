# Labia.AI - Kubernetes Deployment Configuration
# For production deployment on Kubernetes/EKS/GKE

apiVersion: v1
kind: Namespace
metadata:
  name: labia-ai
  labels:
    app: labia-ai
    environment: production

---
# ============================================
# ConfigMap for Application Configuration
# ============================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: labia-ai-config
  namespace: labia-ai
data:
  ENVIRONMENT: "production"
  DEBUG: "False"
  APP_NAME: "Labia.AI"
  API_V1_PREFIX: "/api/v1"
  DEFAULT_CULTURAL_STYLE: "boricua"
  DEFAULT_TONE: "chill"
  LLM_PROVIDER: "openai"
  OPENAI_MODEL: "gpt-4-turbo-preview"
  REDIS_CACHE_TTL: "3600"
  REDIS_RATE_LIMIT_TTL: "86400"
  RATE_LIMIT_FREE: "10"
  RATE_LIMIT_PRO: "100"
  RATE_LIMIT_PREMIUM: "-1"

---
# ============================================
# Secret for Sensitive Data
# ============================================
apiVersion: v1
kind: Secret
metadata:
  name: labia-ai-secrets
  namespace: labia-ai
type: Opaque
stringData:
  DATABASE_URL: "postgresql://user:password@postgres-service:5432/labiaai"
  REDIS_URL: "redis://:password@redis-service:6379/0"
  OPENAI_API_KEY: "sk-your-openai-key-here"
  ANTHROPIC_API_KEY: "sk-ant-your-anthropic-key-here"
  SECRET_KEY: "your-secret-key-change-this-min-32-chars"
  JWT_SECRET_KEY: "your-jwt-secret-key-change-this-must-be-64-chars"
  ALLOWED_ORIGINS: "https://labia.chat,https://www.labia.chat,https://api.labia.chat"

---
# ============================================
# Backend Deployment
# ============================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: labia-ai-backend
  namespace: labia-ai
  labels:
    app: labia-ai
    component: backend
spec:
  replicas: 3  # Horizontal scaling
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: labia-ai
      component: backend
  template:
    metadata:
      labels:
        app: labia-ai
        component: backend
        version: v1
    spec:
      containers:
      - name: backend
        image: your-registry/labia-ai-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP

        # Environment variables from ConfigMap
        envFrom:
        - configMapRef:
            name: labia-ai-config
        - secretRef:
            name: labia-ai-secrets

        # Resource limits
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 2000m
            memory: 4Gi

        # Health checks
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /api/v1/health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2

        # Startup probe (for slow-starting apps)
        startupProbe:
          httpGet:
            path: /api/v1/health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 30

        # Volume mounts
        volumeMounts:
        - name: logs
          mountPath: /app/logs

      # Volumes
      volumes:
      - name: logs
        emptyDir: {}

      # Security context
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000

---
# ============================================
# Backend Service (ClusterIP)
# ============================================
apiVersion: v1
kind: Service
metadata:
  name: labia-ai-backend-service
  namespace: labia-ai
  labels:
    app: labia-ai
    component: backend
spec:
  type: ClusterIP
  selector:
    app: labia-ai
    component: backend
  ports:
  - name: http
    port: 8000
    targetPort: 8000
    protocol: TCP
  sessionAffinity: ClientIP

---
# ============================================
# Horizontal Pod Autoscaler
# ============================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: labia-ai-backend-hpa
  namespace: labia-ai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: labia-ai-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30

---
# ============================================
# Ingress for External Access
# ============================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: labia-ai-ingress
  namespace: labia-ai
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rate-limit: "10"
    nginx.ingress.kubernetes.io/limit-rps: "10"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  tls:
  - hosts:
    - api.labia.chat
    - labia.chat
    secretName: labia-ai-tls
  rules:
  - host: api.labia.chat
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: labia-ai-backend-service
            port:
              number: 8000
  - host: labia.chat
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: labia-ai-backend-service
            port:
              number: 8000

---
# ============================================
# Network Policy (Optional Security)
# ============================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: labia-ai-backend-netpol
  namespace: labia-ai
spec:
  podSelector:
    matchLabels:
      app: labia-ai
      component: backend
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 8000
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: postgres
    ports:
    - protocol: TCP
      port: 5432
  - to:
    - podSelector:
        matchLabels:
          app: redis
    ports:
    - protocol: TCP
      port: 6379
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443  # Allow HTTPS (for LLM APIs)
