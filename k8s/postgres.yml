# Labia.AI - PostgreSQL StatefulSet for Kubernetes
# Note: For production, use managed database (AWS RDS, GCP Cloud SQL, etc.)
# This is for self-hosted Kubernetes deployments only

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: labia-ai
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: standard  # Adjust based on cloud provider

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: labia-ai
data:
  POSTGRES_DB: "labiaai"
  POSTGRES_USER: "labiaai"

---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: labia-ai
type: Opaque
stringData:
  POSTGRES_PASSWORD: "change-this-strong-password"

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: labia-ai
spec:
  serviceName: postgres-service
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        ports:
        - containerPort: 5432
          name: postgres
        envFrom:
        - configMapRef:
            name: postgres-config
        - secretRef:
            name: postgres-secret
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
          subPath: postgres
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 1000m
            memory: 2Gi
        livenessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - labiaai
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - labiaai
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: postgres-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: labia-ai
spec:
  type: ClusterIP
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432
    protocol: TCP
